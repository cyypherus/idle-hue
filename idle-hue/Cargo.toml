[package]
name = "idle-hue"
version = "0.6.1"
edition = "2024"

[features]
prod = []

[dependencies]
# ui = { git = "https://github.com/cyypherus/ui", branch = "mvp" }
haven = { path = "../../haven" }
arboard = "3.4"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "process", "io-util", "time"] }
version-api-client = { path = "../version-api-client" }
version-api-models = { path = "../version-api-models" }
tempfile = "3.8"
zip = "0.6"
semver = { version = "1.0", features = ["serde"] }
anyhow = { workspace = true }
self-replace = "1.5"
log = "0.4"
dirs = "5.0"
env_logger = "0.11.8"
directories = "6.0.0"
color = "0.3.1"

[package.metadata.bundle.bin.idle-hue]
name = "idle-hue"
identifier = "cyy.apps.idle-hue"
icon = ["idle-hue/src/assets/icon.icns"]
