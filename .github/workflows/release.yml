name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: dev
        type: choice
        options: [dev, production]

permissions:
  contents: read

jobs:
  deploy:
    uses: cyypherus/app-update/.github/workflows/release.yml@main
    with:
      environment: ${{ github.event_name == 'release' && 'production' || inputs.environment }}
      app_name: idle-hue
      package: idle-hue
      binary: idle-hue
      project_path: app
      windows_icon: idle-hue/src/assets/icon.ico
    secrets:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APP_UPDATE_REPO_TOKEN: ${{ secrets.APP_UPDATE_REPO_TOKEN }}
      VERSION_SERVER_API_KEY: ${{ secrets.VERSION_SERVER_API_KEY }}
